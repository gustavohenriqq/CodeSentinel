    </text>
  </g>

  <!-- rodapé / paleta -->
  <rect x="90" y="1060" width="1620" height="70" rx="20" fill="#0E1423" stroke="#1D2740"></rect>
  <text x="124" y="1104" fill="#94A3B8" font-size="18" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif">
