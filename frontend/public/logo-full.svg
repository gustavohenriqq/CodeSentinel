  </text>

  <circle cx="368" cy="1095" r="13" fill="#0B0F19"></circle>
  <text x="390" y="1102" fill="#CBD5E1" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">#0B0F19</text>

  <circle cx="560" cy="1095" r="13" fill="#6366F1"></circle>
  <text x="582" y="1102" fill="#CBD5E1" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">#6366F1</text>

  <circle cx="752" cy="1095" r="13" fill="#38BDF8"></circle>
  <text x="774" y="1102" fill="#CBD5E1" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">#38BDF8</text>

  <circle cx="944" cy="1095" r="13" fill="#22C55E"></circle>
  <text x="966" y="1102" fill="#CBD5E1" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">#22C55E</text>

  <circle cx="1136" cy="1095" r="13" fill="#F8FAFC"></circle>
  <text x="1158" y="1102" fill="#CBD5E1" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">#F8FAFC</text>
</svg>