<svg width="1800" height="1200" viewBox="0 0 1800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGlow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#312E81" stop-opacity="0.28"></stop>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="bgGlow2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0EA5E9" stop-opacity="0.18"></stop>
      <stop offset="100%" stop-color="#0B0F19" stop-opacity="0"></stop>
    </linearGradient>

    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2A3350"></stop>
      <stop offset="100%" stop-color="#1A2237"></stop>
    </linearGradient>

    <linearGradient id="gradStroke" x1="56" y1="24" x2="280" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"></stop>
      <stop offset="55%" stop-color="#6366F1"></stop>
      <stop offset="100%" stop-color="#38BDF8"></stop>
    </linearGradient>

    <linearGradient id="gradText" x1="0" y1="0" x2="520" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#A78BFA"></stop>
      <stop offset="55%" stop-color="#8B5CF6"></stop>
      <stop offset="100%" stop-color="#6366F1"></stop>
    </linearGradient>

    <linearGradient id="gradGreen" x1="140" y1="140" x2="186" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#BBF7D0"></stop>
      <stop offset="100%" stop-color="#22C55E"></stop>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"></feDropShadow>
    </filter>

    <filter id="purpleGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"></feGaussianBlur>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.45
                0 1 0 0 0.25
                0 0 1 0 0.95
                0 0 0 0.18 0"></feColorMatrix>
      <feBlend mode="screen" in2="SourceGraphic"></feBlend>
    </filter>

    <symbol id="csIconColor" viewBox="0 0 320 360">
      <!-- escudo -->
      <path d="M160 24C210 24 258 40 292 62V152C292 237 236 299 160 336C84 299 28 237 28 152V62C62 40 110 24 160 24Z" fill="#0D1323" stroke="url(#gradStroke)" stroke-width="12" stroke-linejoin="round"></path>

      <!-- contorno interno -->
      <path d="M160 42C201 42 241 55 270 74V145C270 215 224 267 160 301C96 267 50 215 50 145V74C79 55 119 42 160 42Z" stroke="#A78BFA" stroke-width="4" opacity="0.7" fill="none"></path>

      <!-- detalhes sutis superiores -->
      <path d="M120 88V104H138" stroke="#8B5CF6" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>
      <circle cx="142" cy="104" r="4.5" fill="#8B5CF6"></circle>
      <path d="M200 88V104H182" stroke="#38BDF8" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>
      <circle cx="178" cy="104" r="4.5" fill="#38BDF8"></circle>

      <!-- olho -->
      <path d="M78 168C102 136 218 136 242 168C218 200 102 200 78 168Z" fill="#0A1020" stroke="#7C3AED" stroke-width="9" stroke-linejoin="round"></path>

      <path d="M92 160C115 141 205 141 228 160" stroke="#F8FAFC" stroke-width="10" stroke-linecap="round"></path>

      <path d="M96 168C114 149 206 149 224 168C206 187 114 187 96 168Z" fill="#1B1A52"></path>

      <path d="M121 156L104 168L121 180" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>

      <path d="M199 156L216 168L199 180" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>

      <circle cx="160" cy="168" r="23" fill="url(#gradGreen)"></circle>

      <path d="M160 149A18 18 0 1 1 159.9 149" stroke="#0F172A" stroke-width="7" stroke-linecap="round" fill="none" stroke-dasharray="72 28" transform="rotate(-28 160 168)"></path>

      <circle cx="160" cy="168" r="6.5" fill="#0F172A"></circle>

      <!-- base / reforço -->
      <path d="M94 245C117 260 141 270 160 275C191 264 215 250 231 234" stroke="#8B5CF6" stroke-width="10" stroke-linecap="round" opacity="0.96"></path>

      <path d="M154 275C180 266 203 253 222 238" stroke="#C4B5FD" stroke-width="3.5" stroke-linecap="round" opacity="0.5"></path>
    </symbol>

    <symbol id="csIconMono" viewBox="0 0 320 360">
      <path d="M160 24C210 24 258 40 292 62V152C292 237 236 299 160 336C84 299 28 237 28 152V62C62 40 110 24 160 24Z" fill="none" stroke="#F8FAFC" stroke-width="12" stroke-linejoin="round"></path>

      <path d="M160 42C201 42 241 55 270 74V145C270 215 224 267 160 301C96 267 50 215 50 145V74C79 55 119 42 160 42Z" stroke="#F8FAFC" stroke-width="4" opacity="0.25" fill="none"></path>

      <path d="M120 88V104H138" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"></path>
      <circle cx="142" cy="104" r="4.5" fill="#F8FAFC"></circle>
      <path d="M200 88V104H182" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.92"></path>
      <circle cx="178" cy="104" r="4.5" fill="#F8FAFC"></circle>

      <path d="M78 168C102 136 218 136 242 168C218 200 102 200 78 168Z" fill="none" stroke="#F8FAFC" stroke-width="9" stroke-linejoin="round"></path>

      <path d="M92 160C115 141 205 141 228 160" stroke="#F8FAFC" stroke-width="10" stroke-linecap="round"></path>

      <path d="M121 156L104 168L121 180" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>

      <path d="M199 156L216 168L199 180" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"></path>

      <circle cx="160" cy="168" r="23" fill="none" stroke="#F8FAFC" stroke-width="6"></circle>
      <path d="M160 149A18 18 0 1 1 159.9 149" stroke="#F8FAFC" stroke-width="7" stroke-linecap="round" fill="none" stroke-dasharray="72 28" transform="rotate(-28 160 168)"></path>

      <circle cx="160" cy="168" r="6.5" fill="#F8FAFC"></circle>

      <path d="M94 245C117 260 141 270 160 275C191 264 215 250 231 234" stroke="#F8FAFC" stroke-width="10" stroke-linecap="round" opacity="0.95"></path>

      <path d="M154 275C180 266 203 253 222 238" stroke="#F8FAFC" stroke-width="3.5" stroke-linecap="round" opacity="0.35"></path>
    </symbol>
  </defs>

  <!-- fundo -->
  <rect width="1800" height="1200" rx="36" fill="#0B0F19"></rect>
  <circle cx="250" cy="160" r="320" fill="url(#bgGlow1)"></circle>
  <circle cx="1570" cy="960" r="340" fill="url(#bgGlow2)"></circle>

  <!-- moldura geral -->
  <rect x="36" y="36" width="1728" height="1128" rx="30" stroke="#182033"></rect>

  <!-- cabeçalho -->
  <text x="90" y="102" fill="#F8FAFC" font-size="42" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-1.2">
    CodeSentinel
  </text>
  <text x="90" y="138" fill="#94A3B8" font-size="20" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
    Brand board • identidade visual SaaS de segurança para GitHub e CI/CD
  </text>

  <!-- painéis -->
  <rect x="90" y="180" width="990" height="400" rx="28" fill="#0F1526" stroke="url(#panelStroke)"></rect>
  <rect x="1120" y="180" width="590" height="400" rx="28" fill="#0F1526" stroke="url(#panelStroke)"></rect>
  <rect x="90" y="620" width="990" height="400" rx="28" fill="#0F1526" stroke="url(#panelStroke)"></rect>
  <rect x="1120" y="620" width="590" height="400" rx="28" fill="#060A13" stroke="url(#panelStroke)"></rect>

  <!-- títulos dos painéis -->
  <text x="124" y="228" fill="#64748B" font-size="17" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="2.2">
    LOGO PRINCIPAL
  </text>

  <text x="1154" y="228" fill="#64748B" font-size="17" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="2.2">
    ÍCONE
  </text>

  <text x="124" y="668" fill="#64748B" font-size="17" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="2.2">
    VERSÃO HORIZONTAL
  </text>

  <text x="1154" y="668" fill="#64748B" font-size="17" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="2.2">
    MONOCROMÁTICA / DARK
  </text>

  <!-- LOGO PRINCIPAL -->
  <g transform="translate(120 250)" filter="url(#softShadow)">
    <g transform="scale(0.84)">
      <use href="#csIconColor" width="320" height="360"></use>
    </g>
  </g>

  <text x="390" y="386" fill="#F8FAFC" font-size="96" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-3">
    Code
  </text>
  <text x="602" y="386" fill="url(#gradText)" font-size="96" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-3">
    Sentinel
  </text>
  <text x="394" y="436" fill="#94A3B8" font-size="25" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
    Segurança contínua para repositórios, pipelines e times de desenvolvimento
  </text>

  <!-- pequeno destaque principal -->
  <rect x="394" y="470" width="218" height="40" rx="20" fill="#131A2D" stroke="#28324A"></rect>
  <circle cx="420" cy="490" r="6" fill="#22C55E"></circle>
  <text x="438" y="496" fill="#CBD5E1" font-size="18" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">
    monitoramento ativo
  </text>

  <!-- ÍCONE -->
  <g transform="translate(1260 255)">
    <rect x="-26" y="-18" width="300" height="300" rx="36" fill="#11182C" stroke="#202A42"></rect>
    <circle cx="124" cy="124" r="112" fill="#11182C"></circle>
    <g transform="translate(14 -4)" filter="url(#purpleGlow)">
      <g transform="scale(0.74)">
        <use href="#csIconColor" width="320" height="360"></use>
      </g>
    </g>
  </g>

  <text x="1272" y="500" fill="#CBD5E1" font-size="22" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    app icon / favicon
  </text>
  <text x="1272" y="530" fill="#64748B" font-size="17" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" text-anchor="middle">
    legível em tamanhos pequenos
  </text>

  <!-- VERSÃO HORIZONTAL -->
  <g transform="translate(120 720)">
    <g transform="scale(0.56)" filter="url(#softShadow)">
      <use href="#csIconColor" width="320" height="360"></use>
    </g>

    <text x="215" y="116" fill="#F8FAFC" font-size="76" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-2.2">
      Code
    </text>
    <text x="382" y="116" fill="url(#gradText)" font-size="76" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-2.2">
      Sentinel
    </text>

    <text x="218" y="158" fill="#94A3B8" font-size="22" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
      observabilidade de segurança para código e CI/CD
    </text>

    <path d="M218 190H690" stroke="url(#gradText)" stroke-width="4" stroke-linecap="round" opacity="0.9"></path>
    <circle cx="708" cy="190" r="5" fill="#A78BFA"></circle>
  </g>

  <!-- MONOCROMÁTICA / DARK -->
  <g transform="translate(1162 720)">
    <g transform="scale(0.60)">
      <use href="#csIconMono" width="320" height="360"></use>
    </g>

    <text x="230" y="122" fill="#F8FAFC" font-size="64" font-weight="800" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-1.8">
      CodeSentinel
    </text>

    <text x="232" y="162" fill="#CBD5E1" font-size="20" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif">
      versão limpa para fundo escuro
    </text>

    <rect x="232" y="192" width="224" height="38" rx="19" fill="#0B111E" stroke="#1C263A"></rect>
    <text x="250" y="216" fill="#94A3B8" font-size="16" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif">
